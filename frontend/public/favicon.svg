<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="timerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="45" fill="url(#timerGradient)"/>
  <!-- Inner circle (clock face) -->
  <circle cx="50" cy="50" r="38" fill="#1e1b4b"/>
  <!-- Timer progress arc -->
  <path d="M 50 12 A 38 38 0 1 1 12 50" stroke="#a5b4fc" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Clock hands -->
  <line x1="50" y1="50" x2="50" y2="24" stroke="#f1f5f9" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="68" y2="50" stroke="#f1f5f9" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="5" fill="#6366f1"/>
</svg>
